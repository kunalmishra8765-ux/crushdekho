<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrushDekho 💘</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ff6b9d, #ff8c69, #ffd93d);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 2rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .logo { font-size: 36px; margin-bottom: 4px; }
  h1 { font-size: 28px; font-weight: 700; color: #ff4f7b; margin-bottom: 4px; }
  .tagline { font-size: 13px; color: #999; margin-bottom: 1.5rem; }
  .gender-section { margin-bottom: 1.25rem; }
  .gender-label { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 10px; text-align: left; }
  .gender-btns { display: flex; gap: 10px; }
  .gender-btn {
    flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 14px;
    background: white; font-size: 15px; cursor: pointer; transition: all 0.2s;
    font-weight: 500; color: #555;
  }
  .gender-btn.active { border-color: #ff4f7b; background: #fff0f5; color: #ff4f7b; }
  .input-section { margin-bottom: 1.25rem; text-align: left; }
  .input-label { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 8px; display: block; }
  input[type="text"] {
    width: 100%; padding: 14px 16px; border: 2px solid #eee; border-radius: 14px;
    font-size: 15px; outline: none; transition: border 0.2s; color: #333;
  }
  input[type="text"]:focus { border-color: #ff4f7b; }
  .reveal-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #ff4f7b, #ff8c69);
    color: white; border: none; border-radius: 14px; font-size: 17px;
    font-weight: 700; cursor: pointer; transition: transform 0.2s, opacity 0.2s;
    margin-bottom: 1rem;
  }
  .reveal-btn:hover { transform: scale(1.02); opacity: 0.95; }
  .reveal-btn:active { transform: scale(0.98); }
  .reveal-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading { display: none; margin-top: 1rem; }
  .loading-text {
    font-size: 16px; font-weight: 600; color: #ff4f7b;
    margin-bottom: 8px; min-height: 28px;
  }
  .progress-bar-wrap {
    background: #f0f0f0; border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 6px;
  }
  .progress-bar {
    height: 8px; border-radius: 99px;
    background: linear-gradient(135deg, #ff4f7b, #ff8c69);
    width: 0%; transition: width 0.3s ease;
  }
  .loading-sub { font-size: 12px; color: #bbb; }

  .result { display: none; margin-top: 1rem; }
  .result-title { font-size: 16px; color: #666; margin-bottom: 12px; }
  .result-title span { color: #ff4f7b; font-weight: 700; }
  .gif-container {
    border-radius: 16px; overflow: hidden; margin-bottom: 14px;
    max-height: 260px; display: flex; align-items: center;
    justify-content: center; background: #f9f9f9;
  }
  .gif-container img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 16px; }
  .message { font-size: 15px; color: #444; line-height: 1.6; margin-bottom: 10px; font-style: italic; }
  .good-luck { font-size: 14px; color: #ff4f7b; font-weight: 600; margin-bottom: 10px; }
  .handle { font-size: 12px; color: #bbb; }
  .handle a { color: #ff4f7b; text-decoration: none; font-weight: 600; }
  .try-again {
    margin-top: 14px; background: none; border: 2px solid #ff4f7b;
    color: #ff4f7b; padding: 10px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .try-again:hover { background: #fff0f5; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">💘</div>
  <h1>CrushDekho</h1>
  <p class="tagline">AI ne dekh liya tera crush 👀</p>

  <div class="gender-section">
    <div class="gender-label">Tu kaun hai? 👇</div>
    <div class="gender-btns">
      <button class="gender-btn" id="btn-boy" onclick="selectGender('boy')">🧔 Boy</button>
      <button class="gender-btn" id="btn-girl" onclick="selectGender('girl')">👧 Girl</button>
    </div>
  </div>

  <div class="input-section">
    <label class="input-label">Apna naam daal 😌</label>
    <input type="text" id="nameInput" placeholder="Tera naam yahan..." />
  </div>

  <button class="reveal-btn" id="revealBtn" onclick="revealCrush()">💘 Crush Dekho</button>

  <!-- Loading State -->
  <div class="loading" id="loading">
    <div class="loading-text" id="loadingText">🔍 Scanning the universe...</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="loading-sub" id="loadingSub">Please wait...</div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-title" id="resultTitle"></div>
    <div class="gif-container">
      <img id="resultGif" src="" alt="crush revealed" />
    </div>
    <div class="message" id="resultMessage"></div>
    <div class="good-luck" id="goodLuck"></div>
    <div class="handle">Made with 💻 by <a href="https://instagram.com/kunal_mishra8" target="_blank">@thekunal.build</a> · Follow for more!</div>
    <br>
    <button class="try-again" onclick="tryAgain()">🔄 Phir Se Try Kar</button>
  </div>
</div>

<script>
  let selectedGender = null;

  const girlGifs = [
    "https://media.giphy.com/media/sf4scq9D69wiee3um2/giphy.gif",
    "https://media.giphy.com/media/yhLA2Khq60SSXGAJmz/giphy.gif",
    "https://media.giphy.com/media/l1Ku7Qca1J63p62cg/giphy.gif"
  ];

  const boyGifs = [
    "https://media.giphy.com/media/dSPVCkq9rRpCaWtfY0/giphy.gif"
  ];

  const girlMessages = [
    "Arre wah! AI ne dhundh hi liya tera perfect match 🔍✨",
    "Dekh liya humne bhi... ab teri baari hai! 😏",
    "AI kabhi galat nahi hota... ya hota hai? 👀",
    "Dil ki baat AI tak pahunch gayi 💘",
    "Kismat ne sign de diya hai, bas tu de de jawab! 🌸"
  ];

  const girlGoodLuck = [
    "All the best! Wishing you a future full of love and happiness 🌸",
    "Good luck! Hope your story is as beautiful as you deserve 💫",
    "Wishing you all the courage and luck in the world 🤞",
    "May your feelings reach the right heart. Good luck! 💌",
    "The best is yet to come. Good luck, you've got this! ✨"
  ];

  const boyMessages = [
    "Ja bhai padhai pe dhyaan de, ye sab chhod! 📚",
    "Bhai ye sab chhod, padhai aur kaam pe dhyaan de! 💀",
    "AI itna bhi advance nahi hua abhi... aur tu bhi nahi hua 😭",
    "Crush ka kya hoga pata nahi, placement ka socho pehle bhai 😂"
  ];

  const loadingSteps = [
    { text: "🔍 Scanning your vibe...", sub: "Analyzing personality patterns", progress: 15 },
    { text: "🧠 Reading your mind...", sub: "Connecting to the love database", progress: 30 },
    { text: "💫 Consulting the stars...", sub: "Cross-referencing cosmic data", progress: 48 },
    { text: "📡 Detecting crush signals...", sub: "AI is working overtime for you", progress: 63 },
    { text: "❤️ Processing your feelings...", sub: "Almost there... patience!", progress: 78 },
    { text: "🔐 Unlocking the secret...", sub: "Final verification in progress", progress: 90 },
    { text: "✅ Crush identified!", sub: "Preparing your result...", progress: 100 }
  ];

  function selectGender(gender) {
    selectedGender = gender;
    document.getElementById('btn-boy').classList.toggle('active', gender === 'boy');
    document.getElementById('btn-girl').classList.toggle('active', gender === 'girl');
  }

  function revealCrush() {
    const name = document.getElementById('nameInput').value.trim();
    if (!selectedGender) { alert('Pehle batao tu boy hai ya girl! 😄'); return; }
    if (!name) { alert('Apna naam toh daal yaar! 😅'); return; }

    document.getElementById('revealBtn').disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').scrollIntoView({ behavior: 'smooth' });

    let step = 0;
    const interval = setInterval(() => {
      if (step < loadingSteps.length) {
        document.getElementById('loadingText').textContent = loadingSteps[step].text;
        document.getElementById('loadingSub').textContent = loadingSteps[step].sub;
        document.getElementById('progressBar').style.width = loadingSteps[step].progress + '%';
        step++;
      } else {
        clearInterval(interval);
        setTimeout(() => showResult(name), 400);
      }
    }, 600);
  }

  function showResult(name) {
    document.getElementById('loading').style.display = 'none';

    const resultDiv = document.getElementById('result');
    const resultTitle = document.getElementById('resultTitle');
    const resultGif = document.getElementById('resultGif');
    const resultMessage = document.getElementById('resultMessage');
    const goodLuck = document.getElementById('goodLuck');

    if (selectedGender === 'girl') {
      const gif = girlGifs[Math.floor(Math.random() * girlGifs.length)];
      const msg = girlMessages[Math.floor(Math.random() * girlMessages.length)];
      const luck = girlGoodLuck[Math.floor(Math.random() * girlGoodLuck.length)];
      resultTitle.innerHTML = `<span>${name}</span>, yeh raha tera crush! 💘`;
      resultGif.src = gif;
      resultMessage.textContent = msg;
      goodLuck.textContent = luck;
    } else {
      const gif = boyGifs[Math.floor(Math.random() * boyGifs.length)];
      const msg = boyMessages[Math.floor(Math.random() * boyMessages.length)];
      resultTitle.innerHTML = `<span>${name}</span>, I knew it 😏`;
      resultGif.src = gif;
      resultMessage.textContent = msg;
      goodLuck.textContent = "Ja bhai padhai kar, baaki sab baad mein 📚💪";
    }

    resultDiv.style.display = 'block';
    resultDiv.scrollIntoView({ behavior: 'smooth' });
  }

  function tryAgain() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('nameInput').value = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('revealBtn').disabled = false;
    selectedGender = null;
    document.getElementById('btn-boy').classList.remove('active');
    document.getElementById('btn-girl').classList.remove('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
